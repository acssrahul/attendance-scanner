<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Attendance Scanner</title>
    <style>
        :root {
            --primary: #007AFF;
            --danger: #FF3B30;
            --success: #34C759;
            --bg: #F2F2F7;
            --card: #FFFFFF;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #000;
            -webkit-user-select: none;
        }
        .header {
            background: var(--card);
            padding: 18px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            border-bottom: 1px solid #C6C6C8;
        }
        .container { padding: 16px; }
        
        /* Dashboard Layout */
        .menu-btn {
            background: var(--card);
            padding: 24px;
            margin-bottom: 16px;
            border-radius: 14px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            width: 100%;
        }
        .menu-btn span { color: var(--primary); font-size: 1.3rem; }

        .view { display: none; }
        .view.active { display: block; }
        
        /* Camera UI */
        #camera-stream {
            width: 100%;
            border-radius: 12px;
            background: #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        /* Thumbnail Previews */
        .preview-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 10px 0;
            margin-top: 10px;
            min-height: 90px;
        }
        .thumb-wrapper {
            position: relative;
            display: inline-block;
            flex-shrink: 0;
        }
        .thumb-img {
            width: 70px;
            height: 90px;
            object-fit: cover;
            border-radius: 6px;
            border: 2px solid var(--primary);
        }
        .delete-thumb {
            position: absolute;
            top: -6px;
            right: -6px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Controls & Form Styles */
        .controls {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        button.action-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button.secondary-btn {
            background: #E5E5EA;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .dropdown-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #C6C6C8;
            background: white;
            font-size: 1rem;
        }
        .report-box {
            background: white;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #C6C6C8;
            white-space: pre-wrap;
            font-family: -apple-system, sans-serif;
            margin-top: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
        }
        
        /* Log Items */
        .log-item {
            background: white;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #E5E5EA;
        }
        .log-date { font-size: 0.8rem; color: #8E8E93; margin-bottom: 5px; }
        .log-body { white-space: pre-wrap; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">Attendance Scanner</div>

    <div class="container">
        <div id="dashboard-view" class="view active">
            <button class="menu-btn" onclick="switchView('scanner-view'); startCamera();">
                📸 Mark Attendance <span>›</span>
            </button>
            <button class="menu-btn" onclick="switchView('logs-view'); loadLogs();">
                📂 Attendance Logs <span>›</span>
            </button>
        </div>

        <div id="scanner-view" class="view">
            <video id="camera-stream" autoplay playsinline></video>
            <canvas id="capture-canvas" style="display:none;"></canvas>
            
            <h4 style="margin: 15px 0 5px 0;">Captured Pages (Swipe to view, tap X to delete if blurry):</h4>
            <div class="preview-container" id="thumbContainer"></div>
            
            <div class="controls">
                <button class="action-btn" onclick="capturePage()">Capture Current Page</button>
                <button class="action-btn" style="background:var(--success);" onclick="processAllPages()">Next (Process Data)</button>
                <button class="secondary-btn" onclick="stopCamera(); switchView('dashboard-view');">Cancel</button>
            </div>
        </div>

        <div id="report-view" class="view">
            <h3>Generate Final Report</h3>
            
            <div class="dropdown-group">
                <select id="timeGreeting">
                    <option value="Morning">Morning</option>
                    <option value="Afternoon">Afternoon</option>
                </select>
                <select id="salutation">
                    <option value="Sir">Sir</option>
                    <option value="Mam">Mam</option>
                </select>
                <select id="scrClass">
                    <option value="SCR 1.1">SCR 1.1</option>
                    <option value="SCR 1.2">SCR 1.2</option>
                    <option value="SCR 1.3">SCR 1.3</option>
                    <option value="SCR 1.4">SCR 1.4</option>
                </select>
            </div>

            <button class="action-btn" style="width:100%" onclick="compileAndSaveReport()">Compile & Save to Logs</button>

            <div class="report-box" id="finalReportOutput">Your compiled report will show up here...</div>
            
            <div class="controls">
                <button class="secondary-btn" onclick="switchView('dashboard-view')">Back to Dashboard</button>
            </div>
        </div>

        <div id="logs-view" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Attendance Logs</h3>
                <button style="color:var(--danger); border:none; background:none; font-size:0.9rem;" onclick="clearAllLogs()">Clear Logs</button>
            </div>
            <div id="logsContainer"></div>
            <div class="controls">
                <button class="secondary-btn" onclick="switchView('dashboard-view')">Back to Dashboard</button>
            </div>
        </div>
    </div>

    <script>
        let scannedPages = [];
        let streamInstance = null;
        let finalGeneratedText = "";

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        async function startCamera() {
            const video = document.getElementById('camera-stream');
            try {
                streamInstance = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                video.srcObject = streamInstance;
            } catch (err) {
                alert("Camera access error: " + err);
            }
        }

        function stopCamera() {
            if (streamInstance) {
                streamInstance.getTracks().forEach(track => track.stop());
            }
        }

        function capturePage() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const dataUrl = canvas.toDataURL('image/jpeg');
            scannedPages.push(dataUrl);
            
            updateThumbnails();
        }

        function updateThumbnails() {
            const container = document.getElementById('thumbContainer');
            container.innerHTML = '';
            
            scannedPages.forEach((pageData, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'thumb-wrapper';
