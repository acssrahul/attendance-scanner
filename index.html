<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance AI Scanner</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #000; }
        .header { background: var(--card); padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #C6C6C8; }
        .container { padding: 16px; }
        .view { display: none; }
        .view.active { display: block; }
        
        .menu-btn { background: var(--card); padding: 24px; margin-bottom: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: left; }
        .menu-btn span { color: var(--primary); }
        #camera-wrapper { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
        #camera-stream { width: 100%; display: block; }
        .page-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; z-index: 10; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button.action-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button.secondary-btn { background: #E5E5EA; color: #000; border: none; padding: 16px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: 600; }
        
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 999; font-size: 1.2rem; font-weight: bold; text-align: center; padding: 20px;}
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .dropdown-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        select, input[type="date"], input[type="time"] { flex: 1 1 45%; padding: 12px; border-radius: 8px; border: 1px solid #C6C6C8; background: white; font-size: 1rem; font-family: inherit;}
        .report-box { background: white; padding: 16px; border-radius: 12px; border: 1px solid #C6C6C8; white-space: pre-wrap; margin-top: 15px; min-height: 150px; font-size: 1.05rem; line-height: 1.5; }
        #capture-canvas { display: none; }

        /* PREVIEW GALLERY STYLES */
        .gallery-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .preview-item { position: relative; border-radius: 12px; overflow: hidden; border: 2px solid #C6C6C8; background: #000; }
        .preview-item img { width: 100%; display: block; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 59, 48, 0.95); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        .datetime-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #C6C6C8; margin-bottom: 15px; }
        .datetime-card label { font-weight: 600; display: block; margin-bottom: 5px; color: #333; font-size: 0.9rem;}
        .time-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">Attendance Pilot (Gemini AI)</div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Gemini is analyzing the handwriting...<br><span style="font-size:0.9rem; font-weight:normal;">This usually takes 5 to 10 seconds.</span></div>
    </div>

    <div class="container">
        <div id="dashboard-view" class="view active">
            <button class="menu-btn" onclick="startCamera()">📸 Mark Attendance <span>→</span></button>
            <button class="menu-btn" onclick="switchView('logs-view')">📂 Attendance Logs <span>→</span></button>
        </div>

        <div id="scanner-view" class="view">
            <h3>Scan Attendance Sheets</h3>
            <div id="camera-wrapper">
                <video id="camera-stream" autoplay playsinline muted></video>
                <canvas id="capture-canvas"></canvas>
                <div id="page-count" class="page-badge">Pages: 0</div>
            </div>
            
            <div class="controls">
                <button class="action-btn" onclick="capturePage()">📸 Snap Photo</button>
                <button class="action-btn" style="background:#007AFF;" onclick="showPreview()">Review Images →</button>
                <button class="secondary-btn" onclick="stopCamera(); switchView('dashboard-view');">Cancel</button>
            </div>
        </div>

        <div id="preview-view" class="view">
            <div class="preview-header">
                <h3 style="margin:0;">Review & Setup</h3>
            </div>
            
            <div class="datetime-card">
                <label>Attendance Date:</label>
                <input type="date" id="attDate" style="width: 90%;">
                
                <div class="time-row">
                    <div style="flex:1;">
                        <label>Start Time:</label>
                        <input type="time" id="startTime" style="width: 80%;">
                    </div>
                    <div style="flex:1;">
                        <label>End Time:</label>
                        <input type="time" id="endTime" style="width: 80%;">
                    </div>
                </div>
            </div>

            <div class="gallery-container" id="preview-gallery"></div>

            <div class="controls">
                <button class="action-btn" style="background:#34C759;" onclick="startGeminiAI()">Run Gemini AI Extraction</button>
                <button class="secondary-btn" onclick="switchView('scanner-view'); startCamera();">📸 Add More Pages</button>
                <button class="secondary-btn" style="color: #FF3B30;" onclick="discardAll()">🗑️ Discard All & Cancel</button>
            </div>
        </div>

        <div id="report-view" class="view">
            <h3>Final Report Generator</h3>
            <div class="dropdown-group">
                <select id="timeGreeting"><option value="Morning">Morning</option><option value="Afternoon">Afternoon</option></select>
                <select id="salutation"><option value="Sir">Sir</option><option value="Mam">Mam</option></select>
                <select id="scrClass"><option value="SCR 1.1">SCR 1.1</option><option value="SCR 1.2">SCR 1.2</option><option value="SCR 1.3">SCR 1.3</option><option value="SCR 1.4">SCR 1.4</option></select>
            </div>
            <button class="action-btn" style="width:100%" onclick="generateFinalText()">Format Output</button>
            <div class="report-box" id="finalReportOutput">Your compiled report will appear here...</div>
            <div class="controls" style="margin-top: 15px;">
                <button class="secondary-btn" onclick="switchView('dashboard-view')">Back to Dashboard</button>
            </div>
        </div>

        <div id="logs-view" class="view">
            <h3>Attendance Logs</h3>
            <p style="color:#666;">No historical logs found yet.</p>
            <button class="secondary-btn" onclick="switchView('dashboard-view')" style="width:100%">Back</button>
        </div>
    </div>

    <script>
        let capturedImages = [];
        let streamInstance = null;
        let detectedAbsentees = [];

        // Pre-fill Date and Time based on current moment
        function setDefaultDateTime() {
            const now = new Date();
            document.getElementById('attDate').valueAsDate = now;
            
            let hours = now.getHours();
            // Start time is current hour, End time is next hour
            document.getElementById('startTime').value = `${hours.toString().padStart(2, '0')}:00`;
            document.getElementById('endTime').value = `${(hours + 1).toString().padStart(2, '0')}:00`;
        }
        
        // Run immediately
        setDefaultDateTime();

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        async function startCamera() {
            try {
                streamInstance = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                const video = document.getElementById('camera-stream');
                video.srcObject = streamInstance;
                video.play();
                updatePageCount();
                switchView('scanner-view');
            } catch (err) {
                alert("Camera Error: " + err.message);
            }
        }

        function stopCamera() {
            if (streamInstance) {
                streamInstance.getTracks().forEach(track => track.stop());
            }
        }

        function capturePage() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            capturedImages.push(canvas.toDataURL('image/jpeg', 0.8)); // 0.8 compresses slightly for faster AI upload
            updatePageCount();
            
            const wrapper = document.getElementById('camera-wrapper');
            wrapper.style.opacity = '0.2';
            setTimeout(() => { wrapper.style.opacity = '1'; }, 150);
        }

        function updatePageCount() { document.getElementById('page-count').innerText = `Pages: ${capturedImages.length}`; }

        function showPreview() {
            if(capturedImages.length === 0) { alert("Please snap at least one photo first."); return; }
            stopCamera();
            renderGallery();
            switchView('preview-view');
        }

        function renderGallery() {
            const gallery = document.getElementById('preview-gallery');
            gallery.innerHTML = '';
            capturedImages.forEach((imageSrc, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `<img src="${imageSrc}" alt="Scan ${index + 1}"><button class="delete-btn" onclick="deleteImage(${index})">🗑️ Delete</button>`;
                gallery.appendChild(div);
            });
        }

        function deleteImage(index) {
            capturedImages.splice(index, 1);
            updatePageCount();
            if (capturedImages.length === 0) { switchView('dashboard-view'); } else { renderGallery(); }
        }

        function discardAll() {
            capturedImages = [];
            updatePageCount();
            switchView('dashboard-view');
        }

        // --- GEMINI AI INTEGRATION ---
        async function startGeminiAI() {
            if(capturedImages.length === 0) return;
            
            // Check for API Key in local storage so you don't have to type it every time
            let apiKey = localStorage.getItem('gemini_api_key');
            if (!apiKey) {
                apiKey = prompt("To connect to the Gemini Backend, please paste your free Google AI Studio API Key:");
                if (apiKey) {
                    localStorage.setItem('gemini_api_key', apiKey);
                } else {
                    return; // User cancelled
                }
            }

            document.getElementById('loading-overlay').style.display = 'flex';
            detectedAbsentees = [];

            try {
                // Prepare images for Gemini (strip the base64 prefix)
                const imageParts = capturedImages.map(imgData => {
                    return {
                        inlineData: {
                            mimeType: "image/jpeg",
                            data: imgData.split(',')[1] 
                        }
                    };
                });

                // Give Gemini strict instructions
                const promptText = `You are a strict data extraction AI. Look at these handwritten attendance sheets. 
                Identify the students marked as Absent (usually marked with an 'A' or red ink). 
                The roll numbers typically start with 'RA'. 
                Extract the last 3 digits of the roll numbers for all absent students. 
                Return ONLY a comma-separated list of the 3-digit numbers (e.g., 001, 014, 022). 
                If absolutely no absentees are found, return the exact word "NONE".`;

                const requestBody = {
                    contents: [{ parts: [ { text: promptText }, ...imageParts ] }]
                };

               const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                // Parse my response
                const aiResponse = data.candidates[0].content.parts[0].text.trim().toUpperCase();

                if (aiResponse === "NONE" || aiResponse === "") {
                    detectedAbsentees = [];
                } else {
                    // Split the comma string into a neat array
                    detectedAbsentees = aiResponse.split(',').map(s => s.trim().replace(/[^0-9]/g, ''));
                    // Filter out any empty strings if formatting got messy
                    detectedAbsentees = detectedAbsentees.filter(item => item.length > 0);
                }

                document.getElementById('loading-overlay').style.display = 'none';
                
                if (detectedAbsentees.length === 0) {
                    alert("Gemini analyzed the sheet and found NO absentees.");
                }
                
                switchView('report-view');

            } catch (error) {
                document.getElementById('loading-overlay').style.display = 'none';
                alert("Gemini API Error: " + error.message);
                
                // If the API key is wrong, delete it so it asks again next time
                if(error.message.includes("API key not valid")) {
                    localStorage.removeItem('gemini_api_key');
                }
            }
        }

        // Format Date to dd/mm/yyyy
        function formatDisplayDate(dateString) {
            const d = new Date(dateString);
            return `${d.getDate().toString().padStart(2, '0')}/${(d.getMonth() + 1).toString().padStart(2, '0')}/${d.getFullYear()}`;
        }

        // Format 24hr time to 12hr AM/PM for the final text
        function formatAMPM(timeString) {
            let [hours, minutes] = timeString.split(':');
            hours = parseInt(hours);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'
            return `${hours}:${minutes} ${ampm}`;
        }

        function generateFinalText() {
            const greeting = document.getElementById('timeGreeting').value;
            const salutation = document.getElementById('salutation').value;
            const scr = document.getElementById('scrClass').value;
            
            // Get Dates and Times
            const rawDate = document.getElementById('attDate').value;
            const formattedDate = formatDisplayDate(rawDate);
            const startT = formatAMPM(document.getElementById('startTime').value);
            const endT = formatAMPM(document.getElementById('endTime').value);
            
            detectedAbsentees.sort();
            // Remove duplicates just in case Gemini gets overzealous
            const uniqueAbsentees = [...new Set(detectedAbsentees)];
            
            const listStr = uniqueAbsentees.length > 0 ? uniqueAbsentees.join(', ') : "None detected";
            const totalCount = uniqueAbsentees.length;

            const textReport = `Good ${greeting} ${salutation},\n\nThe absentees of the class ${scr} on ${formattedDate} between ${startT} to ${endT} are:\n${listStr}\n\ntotal number of absentees count = ${totalCount}`;
            
            document.getElementById('finalReportOutput').innerText = textReport;
        }
    </script>
</body>
</html>
