<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Attendance AI Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --card: #FFFFFF; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #000; }
        .header { background: var(--card); padding: 20px; text-align: center; font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #C6C6C8; }
        .container { padding: 16px; }
        .view { display: none; }
        .view.active { display: block; }
        
        .menu-btn { background: var(--card); padding: 24px; margin-bottom: 16px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; font-size: 1.1rem; font-weight: 600; cursor: pointer; border: none; width: 100%; text-align: left; }
        .menu-btn span { color: var(--primary); }
        #camera-wrapper { position: relative; width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 15px; }
        #camera-stream { width: 100%; display: block; }
        .page-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 6px 12px; border-radius: 15px; font-size: 0.9rem; font-weight: bold; z-index: 10; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button.action-btn { background: var(--primary); color: white; border: none; padding: 16px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        button.secondary-btn { background: #E5E5EA; color: #000; border: none; padding: 16px; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: 600; }
        
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 999; font-size: 1.2rem; font-weight: bold; text-align: center; padding: 20px;}
        .spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .dropdown-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        select { flex: 1 1 45%; padding: 12px; border-radius: 8px; border: 1px solid #C6C6C8; background: white; font-size: 1rem; }
        .report-box { background: white; padding: 16px; border-radius: 12px; border: 1px solid #C6C6C8; white-space: pre-wrap; margin-top: 15px; min-height: 150px; font-size: 1.05rem; line-height: 1.5; }
        #capture-canvas { display: none; }

        /* PREVIEW GALLERY STYLES */
        .gallery-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .preview-item { position: relative; border-radius: 12px; overflow: hidden; border: 2px solid #C6C6C8; background: #000; }
        .preview-item img { width: 100%; display: block; }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: rgba(255, 59, 48, 0.95); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        .preview-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="header">Attendance Pilot</div>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">AI is reading the document...<br><span style="font-size:0.9rem; font-weight:normal;">This may take up to 30 seconds. Do not close the app.</span></div>
    </div>

    <div class="container">
        <div id="dashboard-view" class="view active">
            <button class="menu-btn" onclick="startCamera()">📸 Mark Attendance <span>→</span></button>
            <button class="menu-btn" onclick="switchView('logs-view')">📂 Attendance Logs <span>→</span></button>
        </div>

        <div id="scanner-view" class="view">
            <h3>Scan Attendance Sheets</h3>
            <div id="camera-wrapper">
                <video id="camera-stream" autoplay playsinline muted></video>
                <canvas id="capture-canvas"></canvas>
                <div id="page-count" class="page-badge">Pages: 0</div>
            </div>
            
            <div class="controls">
                <button class="action-btn" onclick="capturePage()">📸 Snap Photo</button>
                <button class="action-btn" style="background:#007AFF;" onclick="showPreview()">Review Images →</button>
                <button class="secondary-btn" onclick="stopCamera(); switchView('dashboard-view');">Cancel</button>
            </div>
        </div>

        <div id="preview-view" class="view">
            <div class="preview-header">
                <h3 style="margin:0;">Review Scans</h3>
            </div>
            
            <div class="gallery-container" id="preview-gallery">
                </div>

            <div class="controls">
                <button class="action-btn" style="background:#34C759;" onclick="startAIProcessing()">Confirm & Extract Data</button>
                <button class="secondary-btn" onclick="switchView('scanner-view'); startCamera();">📸 Add More Pages</button>
                <button class="secondary-btn" style="color: #FF3B30;" onclick="discardAll()">🗑️ Discard All & Cancel</button>
            </div>
        </div>

        <div id="report-view" class="view">
            <h3>Review & Generate Report</h3>
            <div class="dropdown-group">
                <select id="timeGreeting"><option value="Morning">Morning</option><option value="Afternoon">Afternoon</option></select>
                <select id="salutation"><option value="Sir">Sir</option><option value="Mam">Mam</option></select>
                <select id="scrClass"><option value="SCR 1.1">SCR 1.1</option><option value="SCR 1.2">SCR 1.2</option><option value="SCR 1.3">SCR 1.3</option><option value="SCR 1.4">SCR 1.4</option></select>
            </div>
            <button class="action-btn" style="width:100%" onclick="generateFinalText()">Generate Final Report</button>
            <div class="report-box" id="finalReportOutput">Your compiled report will appear here...</div>
            <div class="controls" style="margin-top: 15px;">
                <button class="secondary-btn" onclick="switchView('dashboard-view')">Back to Dashboard</button>
            </div>
        </div>

        <div id="logs-view" class="view">
            <h3>Attendance Logs</h3>
            <p style="color:#666;">No historical logs found yet.</p>
            <button class="secondary-btn" onclick="switchView('dashboard-view')" style="width:100%">Back</button>
        </div>
    </div>

    <script>
        let capturedImages = [];
        let streamInstance = null;
        let detectedAbsentees = [];

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        async function startCamera() {
            try {
                streamInstance = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
                });
                const video = document.getElementById('camera-stream');
                video.srcObject = streamInstance;
                video.play();
                updatePageCount();
                switchView('scanner-view');
            } catch (err) {
                alert("Camera Error: " + err.message);
            }
        }

        function stopCamera() {
            if (streamInstance) {
                streamInstance.getTracks().forEach(track => track.stop());
            }
        }

        function capturePage() {
            const video = document.getElementById('camera-stream');
            const canvas = document.getElementById('capture-canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            capturedImages.push(canvas.toDataURL('image/jpeg'));
            updatePageCount();
            
            const wrapper = document.getElementById('camera-wrapper');
            wrapper.style.opacity = '0.2';
            setTimeout(() => { wrapper.style.opacity = '1'; }, 150);
        }

        function updatePageCount() {
            document.getElementById('page-count').innerText = `Pages: ${capturedImages.length}`;
        }

        // --- NEW PREVIEW LOGIC ---
        function showPreview() {
            if(capturedImages.length === 0) {
                alert("Please snap at least one photo first.");
                return;
            }
            stopCamera();
            renderGallery();
            switchView('preview-view');
        }

        function renderGallery() {
            const gallery = document.getElementById('preview-gallery');
            gallery.innerHTML = '';
            
            capturedImages.forEach((imageSrc, index) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <img src="${imageSrc}" alt="Scan ${index + 1}">
                    <button class="delete-btn" onclick="deleteImage(${index})">🗑️ Delete</button>
                `;
                gallery.appendChild(div);
            });
        }

        function deleteImage(index) {
            capturedImages.splice(index, 1); // Remove image from array
            updatePageCount();
            if (capturedImages.length === 0) {
                switchView('dashboard-view'); // Go back if no images left
            } else {
                renderGallery(); // Re-render the remaining images
            }
        }

        function discardAll() {
            capturedImages = [];
            updatePageCount();
            switchView('dashboard-view');
        }
        // -------------------------

        function startAIProcessing() {
            if(capturedImages.length === 0) return;
            
            document.getElementById('loading-overlay').style.display = 'flex';
            detectedAbsentees = [];

            setTimeout(async () => {
                try {
                    const worker = await Tesseract.createWorker('eng');
                    
                    for (let i = 0; i < capturedImages.length; i++) {
                        document.getElementById('loading-text').innerHTML = `AI is reading page ${i + 1} of ${capturedImages.length}...<br><span style="font-size:0.9rem; font-weight:normal;">This takes heavy processing power. Do not close the app.</span>`;
                        
                        const ret = await worker.recognize(capturedImages[i]);
                        const textLines = ret.data.lines;

                        textLines.forEach(line => {
                            const rawText = line.text.toUpperCase();
                            const rollMatch = rawText.match(/RA\d{12}/); 
                            
                            if (rollMatch) {
                                const fullRoll = rollMatch[0];
                                const lastThree = fullRoll.slice(-3);
                                
                                // Checking for "A" indicating absent
                                if (rawText.includes(' A ') || rawText.endsWith(' A') || rawText.endsWith('A\n') || rawText.includes('-A')) {
                                    if(!detectedAbsentees.includes(lastThree)) {
                                        detectedAbsentees.push(lastThree);
                                    }
                                }
                            }
                        });
                    }
                    
                    await worker.terminate();
                    document.getElementById('loading-overlay').style.display = 'none';
                    
                    if (detectedAbsentees.length === 0) {
                        alert("The AI couldn't detect any absentees. Make sure the Roll Numbers and 'A' marks are perfectly legible in the preview window.");
                    }
                    
                    switchView('report-view');

                } catch (error) {
                    document.getElementById('loading-overlay').style.display = 'none';
                    alert("An error occurred: " + error.message);
                    switchView('dashboard-view');
                }
            }, 150); 
        }

        function generateFinalText() {
            const greeting = document.getElementById('timeGreeting').value;
            const salutation = document.getElementById('salutation').value;
            const scr = document.getElementById('scrClass').value;
            
            detectedAbsentees.sort();
            const listStr = detectedAbsentees.length > 0 ? detectedAbsentees.join(', ') : "None detected";
            const totalCount = detectedAbsentees.length;

            const textReport = `Good ${greeting} ${salutation},\n\nThe absentees of the class ${scr} are: ${listStr}\n\ntotal number of absentees count = ${totalCount}`;
            
            document.getElementById('finalReportOutput').innerText = textReport;
        }
    </script>
</body>
</html>
